<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.png?v=2" type="image/png" sizes="256x256">
  <link rel="apple-touch-icon" href="favicon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - Jdiobe STEM Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scroll-animations.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="typography.css" />
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body style="font-family: 'EB Garamond', serif;" class="bg-gray-50 text-gray-800">
  <div id="header"></div>

  <!-- Hero Section -->
  <section class="relative bg-gradient-to-r from-orange-600 to-orange-400 text-white py-16 mb-8 overflow-hidden">
    <img src="https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=900&q=80" alt="Donate" class="absolute inset-0 w-full h-full object-cover opacity-20 pointer-events-none select-none" style="z-index:1;">
    <div class="relative max-w-3xl mx-auto px-4 text-center" style="z-index:2;">
      <h1 class="text-4xl md:text-5xl font-extrabold mb-3">Support Our Mission</h1>
      <p class="text-lg md:text-xl">Your donation empowers the next generation of STEM leaders. Every gift makes a difference!</p>
    </div>
  </section>

  <!-- Donation Cart Section -->
  <section class="py-12">
    <div class="max-w-2xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-orange-700 mb-6 flex items-center"><i data-feather="shopping-cart" class="w-7 h-7 mr-2"></i> Donation Cart</h2>
        <form id="donation-form" class="space-y-6">
          <!-- Preset Amounts -->
          <div>
            <label class="block font-semibold mb-2">Select Amount</label>
            <div class="flex flex-wrap gap-4">
              <button type="button" class="donate-amount-btn bg-orange-50 border border-orange-200 text-orange-700 font-semibold px-6 py-3 rounded-full hover:bg-orange-100 focus:bg-orange-200 focus:outline-none transition" data-amount="25">$25</button>
              <button type="button" class="donate-amount-btn bg-orange-50 border border-orange-200 text-orange-700 font-semibold px-6 py-3 rounded-full hover:bg-orange-100 focus:bg-orange-200 focus:outline-none transition" data-amount="50">$50</button>
              <button type="button" class="donate-amount-btn bg-orange-50 border border-orange-200 text-orange-700 font-semibold px-6 py-3 rounded-full hover:bg-orange-100 focus:bg-orange-200 focus:outline-none transition" data-amount="100">$100</button>
              <button type="button" class="donate-amount-btn bg-orange-50 border border-orange-200 text-orange-700 font-semibold px-6 py-3 rounded-full hover:bg-orange-100 focus:bg-orange-200 focus:outline-none transition" data-amount="250">$250</button>
            </div>
          </div>
          <!-- Custom Amount -->
          <div>
            <label for="custom-amount" class="block font-semibold mb-2">Or Enter Custom Amount</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 font-bold">$</span>
              <input id="custom-amount" name="custom-amount" type="number" min="1" step="1" placeholder="Other amount" class="pl-8 pr-4 py-3 border border-orange-200 rounded-full w-full focus:outline-none focus:ring-2 focus:ring-orange-400" />
            </div>
          </div>
          <!-- Cart Summary -->
          <div class="bg-orange-50 rounded-xl p-6 flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
              <i data-feather="gift" class="w-8 h-8 text-orange-600"></i>
              <span class="font-semibold text-lg">Your Donation</span>
            </div>
            <span id="donation-total" class="text-2xl font-bold text-orange-700">$0</span>
          </div>
          <!-- Donate Button -->
          <button type="submit" class="w-full bg-orange-600 text-white font-semibold py-4 rounded-full shadow hover:bg-orange-700 transition text-lg flex items-center justify-center gap-2"><i data-feather="heart" class="w-6 h-6"></i> Donate Now</button>
        </form>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="main.js"></script>
  <script>
    // Feather icons
    if(window.feather) feather.replace();
    // Donation cart logic
    const amountBtns = document.querySelectorAll('.donate-amount-btn');
    const customAmount = document.getElementById('custom-amount');
    const donationTotal = document.getElementById('donation-total');
    let selectedAmount = 0;
    amountBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        amountBtns.forEach(b => b.classList.remove('bg-orange-200'));
        this.classList.add('bg-orange-200');
        selectedAmount = parseInt(this.getAttribute('data-amount'));
        customAmount.value = '';
        donationTotal.textContent = `$${selectedAmount}`;
      });
    });
    customAmount.addEventListener('input', function() {
      amountBtns.forEach(b => b.classList.remove('bg-orange-200'));
      selectedAmount = parseInt(this.value) || 0;
      donationTotal.textContent = `$${selectedAmount}`;
    });
    document.getElementById('donation-form').addEventListener('submit', function(e) {
      e.preventDefault();
      if(selectedAmount > 0) {
        alert(`Thank you for your generous donation of $${selectedAmount}!`);
      } else {
        alert('Please select or enter a donation amount.');
      }
    });
  </script>
</body>
</html>
