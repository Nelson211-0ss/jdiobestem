<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.png?v=3" type="image/png" sizes="256x256">
  <link rel="apple-touch-icon" href="favicon.png?v=3">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteers - Jdiobe STEM Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scroll-animations.css">
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="theme.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="typography.css" />
  <link rel="stylesheet" href="brand-colors.css" />
  <style>
    .volunteer-field {
      width: 100%;
      border: 1px solid rgb(255 255 255 / 0.25);
      background: rgb(255 255 255 / 0.95);
      padding: 0.7rem 0.9rem;
      color: #1c1917;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .volunteer-field::placeholder { color: #a8a29e; }
    .volunteer-field:focus {
      outline: none;
      border-color: #fff;
      box-shadow: 0 0 0 3px rgb(255 255 255 / 0.35);
    }
  </style>
</head>
<body class="min-h-screen bg-stone-100 text-stone-900 antialiased" style="font-family: 'EB Garamond', Georgia, serif;">
  <div id="preloader" class="preloader" role="status" aria-label="Loading">
    <span class="preloader-spinner">
      <img src="images/partners/preloader/preloader%20icon.png" alt="" class="preloader-icon" width="42" height="42" />
    </span>
  </div>
  <div id="header"></div>

  <!-- Volunteer application — full-bleed background, no card -->
  <section class="relative -mt-24 min-h-screen overflow-hidden pb-14 pt-[8.75rem] md:pb-20 md:pt-[9.25rem]">
    <img
      src="images/teachers.jpeg"
      alt=""
      class="pointer-events-none absolute inset-0 h-full w-full object-cover"
      width="1600"
      height="900"
      loading="eager"
      decoding="async"
    />
    <div class="absolute inset-0 bg-orange-500/88" aria-hidden="true"></div>
    <div
      class="pointer-events-none absolute inset-0 bg-orange-600/25"
      aria-hidden="true"
    ></div>

    <div class="relative z-10 mx-auto max-w-2xl px-4 sm:px-6">
      <header class="text-center text-white">
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-orange-400">Get Involved</p>
        <h1 class="sr-fade-up mt-3 text-3xl font-bold tracking-tight sm:text-4xl">Volunteer With Us</h1>
        <p class="mx-auto mt-4 max-w-xl text-base leading-relaxed text-orange-50/95 sm:text-lg">
          Inspire, mentor, and support the next generation of STEM leaders. Share your skills and we&rsquo;ll be in touch.
        </p>
      </header>

      <form id="volunteer-form" class="mt-10 space-y-5 md:mt-12" novalidate>
        <div>
          <label for="name" class="mb-1.5 block text-sm font-semibold text-white">Full name *</label>
          <input type="text" id="name" name="name" required autocomplete="name" class="volunteer-field" placeholder="Your name" />
        </div>
        <div class="grid gap-5 sm:grid-cols-2">
          <div>
            <label for="email" class="mb-1.5 block text-sm font-semibold text-white">Email *</label>
            <input type="email" id="email" name="email" required autocomplete="email" class="volunteer-field" placeholder="you@email.com" />
          </div>
          <div>
            <label for="phone" class="mb-1.5 block text-sm font-semibold text-white">Phone *</label>
            <input type="tel" id="phone" name="phone" required autocomplete="tel" class="volunteer-field" placeholder="+1 (555) 123-4567" />
          </div>
        </div>
        <div>
          <label for="interest" class="mb-1.5 block text-sm font-semibold text-white">Area of interest *</label>
          <select id="interest" name="interest" required class="volunteer-field">
            <option value="">Select an area</option>
            <option value="mentorship">Mentorship</option>
            <option value="event">Event organization</option>
            <option value="tutoring">STEM tutoring</option>
            <option value="outreach">Community outreach</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label for="message" class="mb-1.5 block text-sm font-semibold text-white">Why do you want to volunteer? *</label>
          <textarea id="message" name="message" rows="4" required class="volunteer-field resize-y" placeholder="Tell us about your motivation and experience..."></textarea>
        </div>
        <button
          type="submit"
          class="flex w-full items-center justify-center gap-2 bg-white px-6 py-3.5 text-base font-semibold text-orange-700 transition hover:bg-orange-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-orange-900 sm:w-auto"
        >
          <i data-feather="send" class="h-5 w-5"></i>
          Submit application
        </button>
      </form>
    </div>
  </section>

  <div id="footer"></div>
  <script src="main.js"></script>
  <script>
    if (window.feather) feather.replace({ 'stroke-width': 2.5 });

    document.getElementById('volunteer-form').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!this.reportValidity()) return;
      alert('Thank you for applying to volunteer! We will contact you soon.');
      this.reset();
    });
  </script>
</body>
</html>
